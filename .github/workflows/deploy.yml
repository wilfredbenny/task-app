name: Deploy Angular to Firebase

on:
  push:
    branches:
      - main  # Triggers when changes are pushed to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Aligned with the Node 22/24 updates
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Environment Files
        run: |
          mkdir -p src/environments

          # Generate the production environment.ts
          cat <<EOF > src/environments/environment.ts
          export const environment = {
              production: true,
              firebase: {
                  apiKey: "${{ secrets.PROD_FIREBASE_API_KEY }}",
                  authDomain: "${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}",
                  projectId: "${{ secrets.PROD_FIREBASE_PROJECT_ID }}",
                  storageBucket: "${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}",
                  messagingSenderId: "${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}",
                  appId: "${{ secrets.PROD_FIREBASE_APP_ID }}",
                  measurementId: "${{ secrets.PROD_FIREBASE_MEASUREMENT_ID }}"
              }
          };
          EOF

          # Create dummy development file to satisfy angular.json rules
          echo "export const environment = { production: false, firebase: {} };" > src/environments/environment.development.ts

      - name: Build Angular Application
        run: npm run build

      - name: Verify Build Output
        run: ls -R dist

      # DEPLOY STEP USING THE OFFICIAL ACTIONS ENGINE (No manual firebase-tools needed)
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: taskapp-641a8
          channelId: live