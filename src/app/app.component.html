<div class="app-window">
  
  <aside class="sidebar" [class.open]="isSidebarOpen()">
    <div class="window-controls">
      <span class="control-dot close"></span>
    </div>

    <div class="sidebar-header" routerLink="/tasks" (click)="closeSidebar()">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2Z" />
        </svg>
      </div>
      <div class="logo-text">
        <h1>Task Manager</h1>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/tasks" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeSidebar()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="9" rx="1"></rect>
          <rect x="14" y="3" width="7" height="5" rx="1"></rect>
          <rect x="14" y="12" width="7" height="9" rx="1"></rect>
          <rect x="3" y="16" width="7" height="5" rx="1"></rect>
        </svg>
        <span>Dashboard</span>
      </a>
      <a routerLink="/tasks/new" routerLinkActive="active" (click)="closeSidebar()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Create Task</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <app-theme-toggle></app-theme-toggle>
    </div>
  </aside>

  <div class="sidebar-overlay" *ngIf="isSidebarOpen()" (click)="closeSidebar()"></div>

  <div class="main-area">
    <header class="mobile-top-bar">
      <button type="button" class="sidebar-toggle-btn" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <span class="mobile-app-title">Task Manager</span>
      <div class="mobile-header-actions">
        <span class="mobile-control-dot close"></span>
      </div>
    </header>

    <main class="content-viewport">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
