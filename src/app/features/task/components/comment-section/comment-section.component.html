<div class="comments-container glass-panel">
  <h3 class="section-title">
    Comments ({{ totalCommentsCount() }})
  </h3>

  <!-- New Comment Form -->
  <div class="new-comment-form">
    <div class="form-grid">
      <div class="form-group mb-none">
        <label for="comment-author">Your Name</label>
        <input 
          type="text" 
          id="comment-author"
          class="form-control" 
          placeholder="e.g. John Doe"
          [(ngModel)]="newAuthor" 
          required />
      </div>
      <div class="form-group mb-none">
        <label for="comment-content">Comment</label>
        <textarea 
          id="comment-content"
          class="form-control" 
          placeholder="Join the discussion..." 
          rows="3"
          [(ngModel)]="newContent" 
          required></textarea>
      </div>
    </div>
    <div class="form-actions mt-md">
      <button 
        type="button" 
        class="btn-primary" 
        [disabled]="!newAuthor().trim() || !newContent().trim()"
        (click)="submitRootComment()">
        Post Comment
      </button>
    </div>
  </div>

  <!-- Divider -->
  <hr class="section-divider" *ngIf="comments().length > 0" />

  <!-- Comments List -->
  <div class="comments-list">
    <app-comment-item 
      *ngFor="let comment of comments()" 
      [comment]="comment" 
      [taskId]="taskId()">
    </app-comment-item>
    
    <div class="no-comments" *ngIf="comments().length === 0">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 0 1-.92 1.78 10.962 10.962 0 0 0 3.325-1.123c.526-.204 1.13-.094 1.58.273A8.86 8.86 0 0 0 12 20.25Z" />
      </svg>
      <p>No comments yet. Start the conversation!</p>
    </div>
  </div>
</div>
