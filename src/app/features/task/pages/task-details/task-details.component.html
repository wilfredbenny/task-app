<div class="page-container" *ngIf="task(); else notFound">
  
  <div class="detail-header">
    <div class="flex-align">
      <button type="button" routerLink="/tasks" class="btn-icon mr-md" title="Back to Dashboard">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
      </button>
      <h2>Task Inspector</h2>
    </div>
    <div class="detail-actions">
      <button type="button" [routerLink]="['/tasks', task()?.id, 'edit']" class="btn-secondary">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        Edit
      </button>
      <button type="button" (click)="deleteTask()" class="btn-danger">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Delete
      </button>
    </div>
  </div>

  <div class="detail-grid mt-lg">
    
    <div class="info-card">
      <div class="info-header">
        <h1 class="task-title">{{ task()?.title }}</h1>
        <div class="meta-row mt-md">
          <span 
            class="badge"
            [class.badge-completed]="task()?.status === 'Completed'"
            [class.badge-progress]="task()?.status === 'In Progress'"
            [class.badge-pending]="task()?.status === 'Pending'">
            {{ task()?.status }}
          </span>
          <div class="deadline-box">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Due Date: <b>{{ task()?.deadline | date:'longDate' }}</b></span>
          </div>
        </div>
      </div>
      
      <hr class="card-divider" />

      <div class="description-section">
        <h4 class="description-label">Description</h4>
        <div class="task-description-html" [innerHTML]="task()?.description"></div>
      </div>
    </div>

    <div class="comments-sidebar">
      <app-comment-section 
        [comments]="task()?.comments || []" 
        [taskId]="task()!.id">
      </app-comment-section>
    </div>
  </div>
</div>

<ng-template #notFound>
  <div class="page-container small-width text-center py-xl">
    <div class="py-xl px-lg border-notfound">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="text-muted">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
      </svg>
      <h2 class="mt-md">Task Not Found</h2>
      <p class="text-secondary mt-sm">The task you are looking for does not exist or has been deleted.</p>
      <button type="button" routerLink="/tasks" class="btn-primary mt-lg">Back to Dashboard</button>
    </div>
  </div>
</ng-template>
